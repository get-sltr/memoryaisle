
[functions.send-welcome-email]
enabled = true
verify_jwt = true
import_map = "./functions/send-welcome-email/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/send-welcome-email/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/send-welcome-email/*.html" ]

[functions.mira-dictate]
enabled = true
verify_jwt = true
import_map = "./functions/mira-dictate/deno.json"
entrypoint = "./functions/mira-dictate/index.ts"

[functions.apple-verify-receipt]
enabled = true
verify_jwt = false  # Function validates user JWT internally via getUser()
entrypoint = "./functions/apple-verify-receipt/index.ts"

[functions.apple-server-notifications]
enabled = true
verify_jwt = false  # Apple sends raw HTTP POST — no Supabase JWT
entrypoint = "./functions/apple-server-notifications/index.ts"
